name: carguard_ai
description: AI-powered Pre-Delivery Inspection Assistant for New Car Buyers
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  google_mlkit_text_recognition: ^0.14.0
  image: ^4.5.4
  image_picker: ^1.1.2
  crop_your_image: ^2.0.0
  intl: ^0.19.0
  path: ^1.9.0
  path_provider: ^2.1.5
  sqflite: ^2.4.1
  http: ^1.2.2
  flutter_onnxruntime: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/vehicles.json
    - assets/data/vin_wmi_registry.json
    - assets/models/car_damage_yolo11n.onnx
